<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo J.Sales - Banco de Currículos</title>
<style>
  body {
    background-color: #0c6194; /* Cor de fundo extraída do logo fornecido */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
  }
  .container {
    text-align: center;
  }
  .image-container img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
  }
  .button-container {
    margin-top: 30px;
  }
  .button {
    background-color: #ffffff;
    border: none;
    color: #0c6194; /* Cor do texto do botão combinando com o fundo */
    padding: 15px 32px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
    transition: background-color 0.3s;
  }
  .button:hover {
    background-color: #f0f0f0;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="image-container">
      <img src="https://i.ibb.co/Xz9tN9Z/logo-central-clt.jpg" alt="Central CLT Logo">
    </div>
    <div class="button-container">
      <a href="mailto:curriculosgrupojsales@gmail.com" class="button">Enviar Currículo</a>
    </div>
  </div>
</body>
</html>
